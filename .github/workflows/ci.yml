name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck 3cx_cert_manager.sh tests/test.sh

      - name: bash syntax check
        run: bash -n 3cx_cert_manager.sh

      - name: unit + smoke tests
        run: bash tests/test.sh
